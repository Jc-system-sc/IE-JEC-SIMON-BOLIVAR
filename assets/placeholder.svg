<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B1A2A"/>
      <stop offset="100%" stop-color="#4A0F1C"/>
    </linearGradient>
    <pattern id="lines" width="14" height="14" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="14" stroke="#C9A84C" stroke-opacity="0.12" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="400" height="300" fill="url(#g)"/>
  <rect width="400" height="300" fill="url(#lines)"/>
  <g transform="translate(200,140)" opacity="0.85">
    <rect x="-28" y="-18" width="56" height="40" rx="4" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
    <circle cx="0" cy="2" r="12" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
    <rect x="10" y="-25" width="14" height="8" rx="2" fill="#C9A84C"/>
  </g>
  <text x="200" y="200" font-family="Montserrat, sans-serif" font-size="12" letter-spacing="2" fill="#F5EDD8" fill-opacity="0.75" text-anchor="middle">FOTOGRAFÍA INSTITUCIONAL</text>
</svg>
